# Alembic configuration for Sales Operating System
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# sys.path modification when running env.py
prepend_sys_path = .

# Timezone for migration file timestamps
timezone = UTC

# Max character length of the "slug" in a migration filename
truncate_slug_length = 40

# Version path separator.  Use os, :, space or newline chars.
version_path_separator = os

# The migration version table name (default: alembic_version)
version_table = alembic_version

# ---------------------------------------------------------------------------
# DATABASE_URL is read from the environment at runtime (see alembic/env.py).
# This value here is only used when running alembic commands locally without
# DATABASE_URL set — it falls back to the SQLite dev database.
# ---------------------------------------------------------------------------
sqlalchemy.url = sqlite+aiosqlite:///./sales_os.db


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
